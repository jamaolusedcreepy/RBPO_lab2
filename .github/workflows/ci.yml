name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: supportdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Keystore хранится в GitHub Secret как base64-строка.
      # Приватный ключ и keystore НЕ находятся в репозитории.
      - name: Restore keystore from GitHub Secret
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > src/main/resources/keystore.p12
            echo "Keystore restored successfully."
          else
            echo "Warning: KEYSTORE_BASE64 secret not configured. SSL will be disabled."
          fi
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Compile
        run: mvn --batch-mode compile

      - name: Test
        run: mvn --batch-mode test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/supportdb
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          SSL_ENABLED: "false"

      - name: Package
        run: mvn --batch-mode package -DskipTests
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/supportdb
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          SSL_ENABLED: "false"

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: support-system-${{ github.sha }}
          path: target/*.jar
          retention-days: 30
