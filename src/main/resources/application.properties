# Server configuration
server.port=${SERVER_PORT:8080}

# PostgreSQL DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/supportdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.com.support=DEBUG

# JWT
# Secret: base64-encoded key >= 256 bits. Change this in production!
jwt.secret=bXlTdXBlclNlY3JldEtleUZvckpXVEF1dGhlbnRpY2F0aW9uMjAyNFN0cm9uZw==
jwt.access-token-expiration-ms=900000
jwt.refresh-token-expiration-ms=604800000