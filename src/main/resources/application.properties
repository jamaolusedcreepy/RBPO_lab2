# Server configuration
server.port=${SERVER_PORT:8443}

# PostgreSQL DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/supportdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.com.support=DEBUG

# TLS / HTTPS
# Для включения: SSL_ENABLED=true, SERVER_PORT=8443, SSL_KEY_STORE_PASSWORD=<пароль>
# Keystore генерируется скриптом generate-certs.sh и НЕ хранится в git
server.ssl.enabled=${SSL_ENABLED:true}
server.ssl.key-store=${SSL_KEY_STORE_PATH:classpath:keystore.p12}
server.ssl.key-store-password=${SSL_KEY_STORE_PASSWORD:MyPassword1!}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=server

# JWT
# Secret: base64-encoded key >= 256 bits. Change this in production!
jwt.secret=bXlTdXBlclNlY3JldEtleUZvckpXVEF1dGhlbnRpY2F0aW9uMjAyNFN0cm9uZw==
jwt.access-token-expiration-ms=900000
jwt.refresh-token-expiration-ms=604800000